name: Update Coffee Data

on:
  schedule:
    # 每天北京时间 06:00 (UTC 22:00 前一天)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch POI data
        run: npm run fetch
        env:
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
          TENCENT_MAP_KEY: ${{ secrets.TENCENT_MAP_KEY }}
          BAIDU_MAP_AK: ${{ secrets.BAIDU_MAP_AK }}
        continue-on-error: true

      - name: Clean and merge
        run: npm run clean

      - name: Score and export
        run: npm run score

      - name: Build site
        run: npm run build

      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: auto-update coffee data $(date -I)"
          git push
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: fetch-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
